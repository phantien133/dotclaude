notes: >-
  Figma import orchestrator. Entry point for all Figma work — detects input mode
  (MCP URL / export folder / hybrid), extracts data, generates a semantic manifest
  at .figma-import/<module>/<timestamp>/manifest.yaml, then invokes f-ui-kit and
  f-page. Reads .claude/figma.yaml (run /f-setup first). Runtime: requires Figma
  MCP server (mcp__figma__get_file, get_file_components, get_local_variables,
  get_file_nodes) when in MCP/hybrid mode. Export mode works without MCP.
