# yaml-language-server: $schema=../../../presets/schema/sidecar.schema.json
#
# SOURCE.yaml is INSIDE the skill folder.
# Installer MUST exclude this file when copying the skill folder to a target.
#
# Self-authored — extends w-task with Phase 4c browser verification.
source:
  repo: https://github.com/phantien133/dotclaude
  commit: 7d6113b47b391c81d1bc103cfd28eed0829b8657
  path: workflow/skills/w-task
  ref: develop
imported_at: "2026-05-28"
license: MIT
modified: true
modifications: >-
  Phase 0: added UI signal detection (0.4) and conditional pause card (0.5) — proactively
  detects Figma URL and UI keywords from intake, asks targeted questions instead of generic ones.
  Saves has_ui + figma_url to state.yaml. Phase 0b updated to read developer's figma_url reply.
  Phase 3: replaced passive gate with active orchestration — f-extract (Figma MCP snapshot) →
  f-implement (code from snapshot, strict ASSET_PLACEHOLDER, unclear-design gate) →
  asset resolution gate (3.3) → finalize. State transitions table updated.
notes: >-
  v2 of w-task — adds Phase 4c localhost browser verification via Chrome DevTools MCP,
  smart UI detection at Phase 0, and active Figma orchestration at Phase 3 using
  f-extract + f-implement (figma-v2 skills). Original w-task is unchanged.
dependencies:
  required:
    agents:
      - planner
      - tdd-guide
      - code-reviewer
    skills:
      - w-checkpoint
      - tdd-workflow
    commands:
      - w-pr
    hooks: []
    rules: []
  optional:
    agents: []
    skills:
      - f-import
    commands: []
    hooks: []
    rules: []
  external:
    - name: chrome-devtools-mcp
      type: npm
      reason: >-
        Required for Phase 4c browser verification. Provides navigate_page,
        evaluate_script, get_console_messages, and take_screenshot tools.
        Installed via npx — requires Node.js and Chrome 144+. Phase 4c is
        skipped gracefully when this MCP is not configured.
    - name: gh
      type: system_binary
      reason: >-
        GitHub CLI is used by Phase 0 intake (`gh issue view <N>`) when
        `.claude/workflow.yaml` sets `issue_tracker.type: github`. Optional for other
        trackers — skill falls back to paste / free-text if `gh` is absent.
    - name: glab
      type: system_binary
      reason: >-
        GitLab CLI is required by `/w-pr` at Phase 6 to open the merge request, and by
        Phase 0 intake when `issue_tracker.type: gitlab` is configured.
tags:
  - workflow
  - tdd
  - feature-dev
  - config-driven
  - browser-verify
categories:
  purpose:
    - dev-workflow
    - tdd
    - browser-verify
  mechanism:
    - state-machine
    - gate-based
    - interactive
