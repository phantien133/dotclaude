# yaml-language-server: $schema=../../../presets/schema/sidecar.schema.json
#
# SOURCE.yaml is INSIDE the skill folder.
# Installer MUST exclude this file when copying the skill folder to a target.
#
# Vendored from upstream/dotclaude (components branch) — self-authored component library.
# Source of truth: upstream/dotclaude/workflow/skills/w-fix/
source:
  repo: https://github.com/phantien133/dotclaude
  commit: f2f3be0233f15845decc89b79be8128a8ea25d84
  path: workflow/skills/w-fix
  ref: components
imported_at: "2026-05-13"
license: MIT
modified: false
modifications: null
notes: >-
  Lightweight bug-fix workflow. 4 phases: intake + locate → fix → commit + docs →
  PR. Scoped to ≤3 files, ≤2h; escalates to /w-task if scope grows. Config-driven
  via .claude/workflow.yaml. Runs inline code-reviewer check before commit.
dependencies:
  required:
    agents:
      - code-reviewer
    skills: []
    commands:
      - w-pr
    hooks: []
    rules: []
  optional:
    agents: []
    skills: []
    commands: []
    hooks: []
    rules: []
  external:
    - name: gh
      type: system_binary
      reason: >-
        GitHub CLI is used by Phase 0 intake (`gh issue view <N>`) when
        `.claude/workflow.yaml` sets `issue_tracker.type: github`. Optional for other
        trackers.
    - name: glab
      type: system_binary
      reason: >-
        GitLab CLI is required by `/w-pr` at Phase 3 to open the merge request, and by
        Phase 0 intake when `issue_tracker.type: gitlab` is configured.
tags:
  - workflow
  - bug-fix
  - quick-fix
  - config-driven
categories:
  purpose:
    - dev-workflow
    - bug-fix
  mechanism:
    - guided-steps
    - interactive
