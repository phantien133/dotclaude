  path: workflow/commands/w-pr.md
  ref: components
imported_at: "2026-05-13"
license: MIT
modified: true
modifications: >-
  Switched the create step from GitHub (`gh pr create`) to GitLab (`glab mr create`) because
  the consumer repo lives on a private GitLab instance. Command name kept as
  `w-pr` for command-suite consistency, but body, prompts, and pr.md output use MR terminology
  and GitLab semantics (--remove-source-branch, --squash-before-merge, project resolution via
  `glab repo view`).
notes: >-
  MR creation command for workflow tasks. Args: <task-slug>. Reads pr.* settings
  from .claude/workflow.yaml and plan.md from state folder to build MR body.
  Runs `glab mr create --draft` (configurable). Called explicitly by developer at end
  of w-task Phase 6 or w-fix Phase 3.
