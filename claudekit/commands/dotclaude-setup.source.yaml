notes: >-
  Self-authored command, source of truth in upstream/dotclaude branch components.
  One-time bootstrap wizard for users who know Claude Code but are new to dotclaude.
  5-phase flow: environment check → onboarding → catalog search → install → confirm.
  Saves dotclaude path + install level to ~/.claude/dotclaude-config.json.
  Catalog search uses mgrep fuzzy match on preset .md files + use_case_tags field.
  Falls back to /preset-wizard if no suitable preset found.
  Delegates error handling to preset-debugger skill.
