notes: >-
  Project-native skill created as part of the wizard-features plan (2026-05-08).
  Diagnoses and fixes failures in dotclaude preset artifacts (YAML, sidecars,
  plugin builds, vitest stubs). Called from /preset-wizard on verify failure, or
  manually by the user. Scope strictly limited to dotclaude preset/plugin artifacts.
  Handles 6 known failure patterns: schema violation, component not found, sidecar
  validation, TS errors, vitest failures, and plugin build crashes.
