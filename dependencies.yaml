# dependencies.yaml — Upstream sources for dotclaude
#
# After CQ-1c/CQ-7 redesign: claudekit/ is the source of truth (plain copy with
# provenance tracked in sidecars). upstream/ serves only as a "source for diff/sync"
# via scripts/sync-from-upstream.ts — it is NO LONGER a runtime dependency.
#
# Refresh workflow:
#   1. git submodule update --remote upstream/<name>
#   2. git -C upstream/<name> rev-parse HEAD  → update pinned_commit below
#   3. pnpm sync <component>  (per-component diff)
#   4. Owner merges manually, updates sidecar source.commit if adopting the new commit
#   5. Commit dependencies.yaml + .gitmodules + sidecar updates

version: 2

sources:
  ecc:
    name: everything-claude-code
    description: Battle-tested agents/skills/hooks/commands collection
    repo: https://github.com/affaan-m/everything-claude-code
    local_path: upstream/everything-claude-code
    pinned_commit: 841beea45cb25ba51f29fa45b7e272938d19b80a
    ref: main
    role: sync_source
    license: MIT

  anthropic_cookbook:
    name: anthropic-cookbook
    description: Official Anthropic API + Claude Code recipe collection
    repo: https://github.com/anthropics/anthropic-cookbook
    local_path: upstream/anthropic-cookbook
    pinned_commit: 93a262f1e00a9d48f58b4c6fe49241b612156452
    ref: main
    role: docs
    license: MIT

  anthropic_skills:
    name: anthropic-skills
    description: Official Anthropic skills collection (skill format reference)
    repo: https://github.com/anthropics/skills
    local_path: upstream/anthropic-skills
    pinned_commit: d211d437443a7b2496a3dad9575e7dddd724c585
    ref: main
    role: docs
    license: MIT

  mcp_servers:
    name: mcp-servers
    description: Official Model Context Protocol server implementations
    repo: https://github.com/modelcontextprotocol/servers
    local_path: upstream/mcp-servers
    pinned_commit: 4503e2d12b799448cd05f789dd40f9643a8d1a6c
    ref: main
    role: docs
    license: MIT

  claude_code:
    name: claude-code
    description: Official Claude Code CLI — plugin collection with vendorable agents/skills/commands/hooks (plugins/ dir), plus AGENTS.md format and hook schema reference
    repo: https://github.com/anthropics/claude-code
    local_path: upstream/claude-code
    pinned_commit: 831608a360511febd4b10c77d4d03b47afda2f5b
    ref: main
    role: sync_source
    license: MIT

  dotclaude:
    name: dotclaude
    description: Self-authored component library — domain-grouped skills/commands/agents/hooks created by this repo. Source of truth for components vendored into claudekit/.
    repo: git@github.com:phantien133/dotclaude.git
    local_path: upstream/dotclaude
    pinned_commit: 4fa080f0686a5a52197ab737254fc08984d96d45
    ref: components
    role: sync_source
    license: MIT
