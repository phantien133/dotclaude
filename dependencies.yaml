# dependencies.yaml — Nguồn external cho mọi package
#
# Mỗi entry trong `sources:` khai báo một plugin/repo external.
# Các package (packages/user, packages/presets/*) chỉ tham chiếu source ID,
# không hardcode URL/path lặp lại.
#
# Update workflow:
#   1. Cập nhật submodule:  git submodule update --remote vendor/<name>
#   2. Refresh `pinned_commit`:  git -C vendor/<name> rev-parse HEAD
#   3. Commit dependencies.yaml + .gitmodules

version: 1

sources:
  # ECC — dependency runtime (installer dùng)
  ecc:
    name: everything-claude-code
    description: Battle-tested agents/skills/hooks/commands collection
    repo: https://github.com/affaan-m/everything-claude-code
    local_path: vendor/everything-claude-code
    pinned_commit: null      # TODO: git -C vendor/everything-claude-code rev-parse HEAD
    ref: main
    role: runtime            # installer resolve modules từ repo này

  # Docs-only sources — tham khảo khi build agents/skills/MCP, không phải runtime
  anthropic_cookbook:
    name: anthropic-cookbook
    description: Official Anthropic API + Claude Code recipe collection
    repo: https://github.com/anthropics/anthropic-cookbook
    local_path: vendor/anthropic-cookbook
    pinned_commit: null
    ref: main
    role: docs

  anthropic_skills:
    name: anthropic-skills
    description: Official Anthropic skills collection (skill format reference)
    repo: https://github.com/anthropics/skills
    local_path: vendor/anthropic-skills
    pinned_commit: null
    ref: main
    role: docs

  mcp_servers:
    name: mcp-servers
    description: Official Model Context Protocol server implementations
    repo: https://github.com/modelcontextprotocol/servers
    local_path: vendor/mcp-servers
    pinned_commit: null
    ref: main
    role: docs
