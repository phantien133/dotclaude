# yaml-language-server: $schema=../../schema/preset.schema.json
name: developer
kind: core
description: Extends ai-native with cross-stack developer tooling — GitHub ops, quality gates, and architecture planning. Security and TDD are intentionally left to language/framework presets.
version: 0.2.0
extends:
  - ai-native
components:
  skills:
    - name: tdd-workflow
      source: everything-claude-code
    - name: github-ops
      source: everything-claude-code
  commands:
    - name: prp-plan
      source: everything-claude-code
    - name: feature-dev
      source: everything-claude-code
  agents:
    - name: planner
      source: everything-claude-code
    - name: code-architect
      source: everything-claude-code
    - name: code-explorer
      source: everything-claude-code
    - name: code-reviewer
      source: everything-claude-code
    - name: code-simplifier
      source: everything-claude-code
  hooks:
    - name: post-edit-typecheck
      source: everything-claude-code
    - name: pre-bash-commit-quality
      source: everything-claude-code
    - name: block-no-verify
      source: everything-claude-code
settings_patch:
  hooks:
    PostToolUse:
      - matcher: "Edit"
        hooks:
          - type: command
            command: "node ~/.claude/hooks/post-edit-typecheck.js"
    PreToolUse:
      - matcher: "Bash"
        hooks:
          - type: command
            command: "node ~/.claude/hooks/pre-bash-commit-quality.js"
          - type: command
            command: "node ~/.claude/hooks/block-no-verify.js"
recommended_install_level: user
tags:
  - developer
  - cross-stack
  - quality
use_case_tags:
  roles:
    - developer
    - software-engineer
  project_types:
    - any
  stacks: []
  use_cases:
    - code-review
    - pr-workflow
    - architecture
    - feature-development
