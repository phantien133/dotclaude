# yaml-language-server: $schema=../../schema/preset.schema.json
name: core
kind: core
description: Universal baseline for any Claude Code user — context management, productivity, and semantic search.
version: 0.1.0
extends: []
components:
  skills:
    - name: doc-coauthoring
      source: anthropic-skills
    - name: setup-hooks
      source: dotclaude-self
  hooks:
    - name: suggest-compact
      source: everything-claude-code
    - name: pre-compact
      source: everything-claude-code
    - name: desktop-notify
      source: everything-claude-code
    - name: cost-tracker
      source: everything-claude-code
    - name: doc-file-warning
      source: everything-claude-code
settings_patch:
  extraKnownMarketplaces:
    Mixedbread-Grep:
      source:
        source: github
        repo: mixedbread-ai/mgrep
  enabledPlugins:
    "mgrep@Mixedbread-Grep": true
  hooks:
    PreToolUse:
      - matcher: "Edit|Write"
        hooks:
          - type: command
            command: "node ~/.claude/hooks/suggest-compact.js"
      - matcher: "Write"
        hooks:
          - type: command
            command: "node ~/.claude/hooks/doc-file-warning.js"
    PreCompact:
      - matcher: "*"
        hooks:
          - type: command
            command: "node ~/.claude/hooks/pre-compact.js"
    Stop:
      - matcher: "*"
        hooks:
          - type: command
            command: "node ~/.claude/hooks/desktop-notify.js"
          - type: command
            command: "node ~/.claude/hooks/cost-tracker.js"
external_setup:
  - name: mgrep
    kind: claude_plugin
    standalone: false
    install_hint: "/plugins install mgrep@Mixedbread-Grep"
    complexity: simple
    docs_url: "https://github.com/mixedbread-ai/mgrep"
    notes: "Semantic code search plugin. settings_patch registers the Mixedbread-Grep marketplace and auto-enables the plugin."
recommended_install_level: user
tags:
  - core
  - universal
  - context-management
  - productivity
use_case_tags:
  roles:
    - any
  project_types:
    - any
  stacks: []
  use_cases:
    - context-management
    - documentation
    - cost-tracking
    - semantic-search
