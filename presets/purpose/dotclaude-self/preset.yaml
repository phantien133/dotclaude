# yaml-language-server: $schema=../../schema/preset.schema.json
name: dotclaude-self
kind: purpose
description: Full dotclaude working environment — preset authoring wizards, self-learning, component picker, and skill creator. Use when working inside the cloned dotclaude repo.
version: 0.3.0
extends:
  - developer
components:
  skills:
    - name: dotclaude-component-picker
      source: dotclaude-self
    - name: preset-debugger
      source: dotclaude-self
    - name: plugin-discovery
      source: dotclaude-self
  commands:
    - name: preset-wizard
      source: dotclaude-self
    - name: dotclaude-setup
      source: dotclaude-self
settings_patch: {}
external_setup: []
use_case_tags:
  roles:
    - developer
  project_types:
    - tooling
  stacks:
    - claude-code
  use_cases:
    - preset-authoring
    - setup
    - onboarding
    - component-management
    - self-learning
tags:
  - self
  - learning
  - dotclaude
  - wizard
  - preset-authoring
