# yaml-language-server: $schema=../../presets/schema/preset.schema.json
name: dotclaude-self
kind: purpose
description: Self-learning setup for dotclaude — observes sessions via hooks, builds project-scoped instincts, evolves them into reusable components.
version: 0.1.0
extends: []
components:
  agents: []
  skills:
    - continuous-learning-v2
    - dotclaude-component-picker
    - skill-creator
  commands: []
  hooks: []
  rules: []
settings_patch:
  hooks:
    PreToolUse:
      - matcher: "*"
        hooks:
          - type: command
            command: ".claude/skills/continuous-learning-v2/hooks/observe.sh pre"
    PostToolUse:
      - matcher: "*"
        hooks:
          - type: command
            command: ".claude/skills/continuous-learning-v2/hooks/observe.sh"
tags:
  - self
  - learning
  - dotclaude
