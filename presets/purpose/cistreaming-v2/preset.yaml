# yaml-language-server: $schema=../../schema/preset.schema.json
name: cistreaming-v2
kind: purpose
description: Dev workflow preset for the cistreaming platform v2 (NestJS + Next.js + SRS + GraphQL). 8-phase workflow (Plane ticket intake → context → plan → impact → UI → TDD → verify → PR), Figma integration, doc governance, and streaming-specific rules.
version: 0.1.0
extends:
  - nestjs
  - nextjs
components:
  skills:
    # UI integration (Phase 3)
    - name: build-ui-kit
      source: private
    - name: build-static-page
      source: private
    # PR creation (Phase 6)
    - name: create-pr
      source: private
    # Streaming workflow orchestration
    - name: dev-task
      source: private
    - name: dev-task-status
      source: private
    - name: dev-task-reset
      source: private
    - name: quick-fix
      source: private
    - name: streaming-figma
      source: private
    # Streaming utility skills
    - name: streaming-oq-check
      source: private
    - name: streaming-adr
      source: private
    - name: streaming-checkpoint
      source: private
    - name: streaming-test-stubs
      source: private
  rules:
    - name: streaming-context
      source: private
    - name: hilab-streaming-rules
      source: private
    - name: streaming-docs-governance
      source: private
  agents:
    - name: planner
      source: everything-claude-code
    - name: tdd-guide
      source: everything-claude-code
    - name: code-reviewer
      source: everything-claude-code
  commands:
    - name: hsd-story-lint
      source: private
    - name: hsd-post-merge
      source: private
recommended_install_level: project
tags:
  - hilab
  - private
  - streaming
  - nestjs
  - nextjs
  - graphql
use_case_tags:
  roles:
    - fullstack-developer
    - backend-developer
    - developer
  project_types:
    - monorepo
    - streaming-service
    - web-app
  stacks:
    - typescript
    - nestjs
    - nextjs
    - graphql
    - prisma
    - redis
  use_cases:
    - dev-workflow
    - tdd
    - ui-integration
    - pr-workflow
    - api-development
    - doc-governance
