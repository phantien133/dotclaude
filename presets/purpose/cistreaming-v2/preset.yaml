# yaml-language-server: $schema=../../schema/preset.schema.json
name: cistreaming-v2
kind: purpose
description: Dev workflow preset for the cistreaming platform v2 (NestJS + Next.js + SRS + GraphQL). 8-phase workflow (Plane ticket intake → context → plan → impact → UI → TDD → verify → PR), Figma integration, doc governance, and streaming-specific rules.
version: 0.1.0
extends:
  - nestjs
  - nextjs
components:
  skills:
    # UI integration (Phase 3)
    - build-ui-kit
    - build-static-page
    # PR creation (Phase 6)
    - create-pr
    # Streaming workflow orchestration
    - dev-task
    - dev-task-status
    - dev-task-reset
    - quick-fix
    - streaming-figma
    # Streaming utility skills
    - streaming-oq-check
    - streaming-adr
    - streaming-checkpoint
    - streaming-test-stubs
  rules:
    - streaming-context
    - hilab-streaming-rules
    - streaming-docs-governance
  agents:
    - planner
    - tdd-guide
    - code-reviewer
  commands:
    - hsd-story-lint
    - hsd-post-merge
recommended_install_level: project
tags:
  - hilab
  - private
  - streaming
  - nestjs
  - nextjs
  - graphql
use_case_tags:
  roles:
    - fullstack-developer
    - backend-developer
    - developer
  project_types:
    - monorepo
    - streaming-service
    - web-app
  stacks:
    - typescript
    - nestjs
    - nextjs
    - graphql
    - prisma
    - redis
  use_cases:
    - dev-workflow
    - tdd
    - ui-integration
    - pr-workflow
    - api-development
    - doc-governance
