# yaml-language-server: $schema=../../schema/preset.schema.json
name: cistreaming-v3
kind: purpose
description: >-
  Dev workflow preset for the cistreaming platform v3 (NestJS + Next.js + SRS + GraphQL).
  Inherits full developer → nestjs/nextjs chain. Adds f-* Figma suite (f-import / f-ui-kit /
  f-page / f-review) replacing build-ui-kit / build-static-page / streaming-figma.
  Retains v2 workflow skills (dev-task / quick-fix / streaming-checkpoint) and
  streaming-specific rules.
version: 0.1.0
extends:
  - nestjs
  - nextjs
components:
  agents:
    # tdd-guide is not in developer chain — must declare explicitly
    - name: tdd-guide
      source: everything-claude-code
  skills:
    # Private workflow skills (not in any public preset)
    - name: dev-task
      source: private
    - name: dev-task-status
      source: private
    - name: dev-task-reset
      source: private
    - name: quick-fix
      source: private
    - name: streaming-checkpoint
      source: private
    - name: create-pr
      source: private
    # Figma suite — NEW in v3, replaces build-ui-kit + build-static-page + streaming-figma
    - name: f-import
      source: figma
    - name: f-ui-kit
      source: figma
    - name: f-page
      source: figma
    - name: f-review
      source: figma
    # Private streaming utilities
    - name: streaming-oq-check
      source: private
    - name: streaming-adr
      source: private
    - name: streaming-test-stubs
      source: private
  commands:
    - name: hsd-story-lint
      source: private
    - name: hsd-post-merge
      source: private
    # Figma config wizard — NEW in v3
    - name: f-setup
      source: figma
  rules:
    - name: streaming-context
      source: private
    - name: hilab-streaming-rules
      source: private
    - name: streaming-docs-governance
      source: private
recommended_install_level: project
tags:
  - hilab
  - private
  - streaming
  - nestjs
  - nextjs
  - graphql
  - figma
use_case_tags:
  roles:
    - fullstack-developer
    - backend-developer
    - developer
  project_types:
    - monorepo
    - streaming-service
    - web-app
  stacks:
    - typescript
    - nestjs
    - nextjs
    - graphql
    - prisma
    - redis
  use_cases:
    - dev-workflow
    - tdd
    - ui-integration
    - figma
    - pr-workflow
    - api-development
    - doc-governance
