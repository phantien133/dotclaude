name: promote-develop-to-master

on:
  push:
    branches: [develop]

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          submodules: false
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch all refs
        run: git fetch origin

      - name: Setup release branch worktree
        run: |
          if git ls-remote --exit-code origin refs/heads/release/promote-to-master; then
            # Branch exists: create local tracking branch then add worktree (avoids detached HEAD)
            git fetch origin release/promote-to-master:refs/heads/release/promote-to-master
            git worktree add /tmp/release-wt release/promote-to-master
          else
            git worktree add -b release/promote-to-master /tmp/release-wt origin/master
          fi

      - name: rsync develop → release branch
        run: |
          rsync -av --delete \
            --exclude-from="${GITHUB_WORKSPACE}/.ci/master-strip.txt" \
            ./ /tmp/release-wt/

      - name: Commit if changed
        id: commit
        run: |
          cd /tmp/release-wt
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing to promote — no changes outside dev-only dirs."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          SHORT_SHA=$(git -C "$GITHUB_WORKSPACE" rev-parse --short HEAD)
          git commit -m "chore(master): sync from develop ${SHORT_SHA}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Push release branch
        if: steps.commit.outputs.changed == 'true'
        run: git -C /tmp/release-wt push origin HEAD:release/promote-to-master

      - name: Create or update PR
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list \
            --base master \
            --head release/promote-to-master \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            gh pr create \
              --base master \
              --head release/promote-to-master \
              --title "chore(master): promote plugins from develop" \
              --body "Auto-generated by CI. Syncs \`plugins/\` and \`.claude-plugin/\` (and any non-dev-only changes) from \`develop\` to \`master\`.

**Excluded from master:** \`claudekit/\`, \`presets/\`, \`scripts/\`, \`upstream/\`, \`CLAUDE.md\`, \`.claude/\`, \`.github/\`, \`.ci/\`

Strip list: [\`.ci/master-strip.txt\`](.ci/master-strip.txt)"
            echo "PR created."
          else
            echo "PR #${PR_NUMBER} already open — commit appended."
          fi
