hooks:
  - file: suggest-compact.js
    description: Suggest /compact to preserve context
    event: PreToolUse
    matcher: Edit|Write
    preset: core
  - file: doc-file-warning.js
    description: Warn before creating ad-hoc doc files (NOTES, TODO, SCRATCH, etc.)
    event: PreToolUse
    matcher: Write
    preset: core
  - file: pre-compact.js
    description: Save session state before compaction
    event: PreCompact
    matcher: '*'
    preset: core
  - file: desktop-notify.js
    description: Desktop notification when Claude stops
    event: Stop
    matcher: '*'
    preset: core
  - file: cost-tracker.js
    description: Append token usage to ~/.claude/metrics/costs.jsonl
    event: Stop
    matcher: '*'
    preset: core
  - file: post-edit-typecheck.js
    description: TypeScript check after editing .ts/.tsx files
    event: PostToolUse
    matcher: Edit
    preset: developer
  - file: pre-bash-commit-quality.js
    description: Quality gate before git commit
    event: PreToolUse
    matcher: Bash
    preset: developer
  - file: block-no-verify.js
    description: Block --no-verify flag to prevent bypassing hooks
    event: PreToolUse
    matcher: Bash
    preset: developer
